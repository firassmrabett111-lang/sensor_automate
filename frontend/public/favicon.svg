<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.8" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="120" height="120" fill="url(#bgGrad)" rx="28" filter="url(#shadow)"/>
  
  <!-- Decorative circle elements -->
  <circle cx="30" cy="30" r="8" fill="white" opacity="0.15"/>
  <circle cx="95" cy="85" r="12" fill="white" opacity="0.1"/>
  
  <!-- Main browser window frame -->
  <rect x="20" y="25" width="80" height="70" fill="white" rx="6" opacity="0.95"/>
  
  <!-- Browser toolbar area -->
  <rect x="20" y="25" width="80" height="16" fill="url(#bgGrad)" rx="6"/>
  
  <!-- Browser control buttons (left side) -->
  <circle cx="32" cy="33" r="2" fill="#ef4444"/>
  <circle cx="41" cy="33" r="2" fill="#f59e0b"/>
  <circle cx="50" cy="33" r="2" fill="#10b981"/>
  
  <!-- Address bar -->
  <rect x="62" y="29" width="30" height="8" fill="white" rx="3" opacity="0.8"/>
  <line x1="65" y1="29" x2="65" y2="37" stroke="#0ea5e9" stroke-width="0.8" opacity="0.5"/>
  
  <!-- Content area with modern elements -->
  <!-- Large gradient circle (sensor data visualization) -->
  <circle cx="45" cy="58" r="18" fill="url(#glowGrad)" opacity="0.7" filter="url(#glow)"/>
  
  <!-- Surrounding data points -->
  <circle cx="30" cy="50" r="4" fill="#0284c7" opacity="0.6"/>
  <circle cx="60" cy="48" r="4" fill="#06b6d4" opacity="0.6"/>
  <circle cx="38" cy="72" r="4" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="68" cy="70" r="4" fill="#0284c7" opacity="0.6"/>
  
  <!-- Connection lines between data points -->
  <line x1="45" y1="58" x2="30" y2="50" stroke="#0284c7" stroke-width="1.2" opacity="0.4"/>
  <line x1="45" y1="58" x2="60" y2="48" stroke="#06b6d4" stroke-width="1.2" opacity="0.4"/>
  <line x1="45" y1="58" x2="38" y2="72" stroke="#0ea5e9" stroke-width="1.2" opacity="0.4"/>
  <line x1="45" y1="58" x2="68" y2="70" stroke="#0284c7" stroke-width="1.2" opacity="0.4"/>
  
  <!-- Shine effect -->
  <ellipse cx="50" cy="35" rx="35" ry="25" fill="white" opacity="0.05"/>
</svg>